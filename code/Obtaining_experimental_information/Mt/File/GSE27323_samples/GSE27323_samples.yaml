  "series_summary": "The thermophilic filamentous fungi Myceliophthora thermophila\
    \ (Sporotrichum thermophile) and Thielavia terrestris are proficient decomposers\
    \ of cellulose, suggesting that they will be a rich source of thermostable industrial\
    \ enzymes for lignocellulose degradation.  To identify the genes and proteins\
    \ involved in this process, we explored the transcriptomes of M. thermophila and\
    \ T. terrestris growing at 45 \xBAC on either glucose, alfalfa, or barley straw\
    \ by short-read sequencing of extracted mRNA.  To better understand the adaptations\
    \ that allow these fungi to grow at elevated temperatures, we compared their transcriptomes\
    \ when growing at 34C to their transcritomes at 45C, and also to the transcriptome\
    \ of the related fungus Chaetomium globosum, which does not grow at 45C."
  "series_supplementary_file": "ftp://ftp.ncbi.nlm.nih.gov/geo/series/GSE27nnn/GSE27323/suppl/GSE27323_RAW.tar"
  "series_title": "Transcriptomic response to substrate and temperature in two thermophilic\
    \ fungi, Myceliophthora thermophila and Thielavia terrestris, and a related mesophile,\
    \ Chaetomium globosum"
  "series_type": "Expression profiling by high throughput sequencing"


